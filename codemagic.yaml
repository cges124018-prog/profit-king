# Codemagic configuration for Flutter iOS app
workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_connect # 稍後需在 Codemagic 後台 Environment variables 綁定
      flutter: stable
    triggering:
      events:
        - push
    scripts:
      - name: Manual Code signing
        script: |
          keychain initialize
          keychain add-certificates --certificate ios_distribution.p12 --certificate-password "1234"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp ios_distribution.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Get packages
        script: |
          flutter packages pub get
      - name: Flutter build ipa
        script: |
          PROV_NAME=$(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/ios_distribution.mobileprovision | grep -A1 "<key>Name</key>" | grep "<string>" | sed -e 's/.*<string>//' -e 's/<\/string>.*//')
          echo "Found Provisioning profile name: $PROV_NAME"
          cat <<EOF > ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>A9L2KQ9GGA</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.seth.profitking.profitKing</key>
              <string>$PROV_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF
          flutter build ipa --release --build-name=1.0.0 --build-number=1 --export-options-plist=ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID


